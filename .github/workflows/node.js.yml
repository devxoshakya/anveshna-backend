name: Deploy Express Backend

on:
  push:
    branches:
      - main  # Adjust this to match your main branch name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18'  # Adjust this to match your Node.js version

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build  # Adjust this to match your build script if needed

    - name: Start server
      run: npm start
